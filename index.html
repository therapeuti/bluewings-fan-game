<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="단어, 단문, 장문 모드를 지원하는 타자 연습 게임" />
    <title>타자 연습 게임</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="header-top">
          <div>
            <p class="eyebrow">Bluewings Typing</p>
            <h1>수원 삼성 블루윙즈 응원가 타자연습</h1>
          </div>
          <div class="header-accent" aria-hidden="true">
            <span class="accent-blue"></span>
            <span class="accent-white"></span>
            <span class="accent-red"></span>
          </div>
        </div>
        <div class="header-mode-bar">
          <div id="mode-list" class="mode-list"></div>
        </div>
      </header>

      <main class="app-main">
        <section id="play-panel" class="play-panel" aria-live="polite"></section>
      </main>

      <footer class="app-footer">
        <div class="footer-grid">
          <section class="footer-block">
            <div class="footer-heading">
              <span class="footer-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M12 3l2.4 4.86 5.36.78-3.88 3.78.92 5.33L12 15.7l-4.8 2.52.92-5.33-3.88-3.78 5.36-.78L12 3z" />
                </svg>
              </span>
              <h2>블루윙즈 타자연습</h2>
            </div>
            <p>
              수원삼성블루윙즈 응원가와 문장을 더 빠르고 정확하게 익힐 수 있도록 만든 연습 공간입니다.
            </p>
          </section>

          <section class="footer-block">
            <div class="footer-heading">
              <span class="footer-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M4 6h16M4 12h16M4 18h10" />
                </svg>
              </span>
              <h2>바로가기</h2>
            </div>
            <ul class="footer-links">
              <li><a href="https://github.com/therapeuti/bluewings-fan-game" target="_blank" rel="noreferrer">GitHub 저장소</a></li>
              <li><a href="https://www.bluewings.kr/" target="_blank" rel="noreferrer">수원삼성블루윙즈</a></li>
              <li><a href="https://github.com/therapeuti/bluewings-fan-game/issues" target="_blank" rel="noreferrer">이슈 남기기</a></li>
              <li><a href="https://forms.gle/18R8y3RQCV6jmTPg9" target="_blank" rel="noreferrer">버그/오류 피드백</a></li>
            </ul>
          </section>
        </div>

        <div class="footer-bottom">
          <p>© 2026 Bluewings Fan Game</p>
          <div class="footer-badges" aria-hidden="true">
            <span class="badge-blue"></span>
            <span class="badge-white"></span>
            <span class="badge-red"></span>
          </div>
        </div>
      </footer>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
