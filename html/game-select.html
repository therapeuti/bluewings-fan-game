<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>난이도 선택 - 블루윙스 팬 게임</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="bg-gray-50">
    <!-- 헤더 -->
    <header class="bg-gradient-to-r from-bluewings-primary to-bluewings-dark text-white shadow-lg">
      <div class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between">
          <div>
            <a href="../index.html" class="text-blue-100 hover:text-white text-sm font-medium">
              ← 홈으로 돌아가기
            </a>
            <h1 class="text-2xl font-bold mt-2" id="game-title">게임 선택</h1>
          </div>
        </div>
      </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="max-w-4xl mx-auto px-4 py-12">
      <!-- 안내 메시지 -->
      <section class="bg-white rounded-lg shadow-md p-8 mb-8">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">난이도를 선택하세요</h2>
        <p class="text-gray-600">
          게임 난이도에 따라 문제의 길이, 시간 제한, 점수 획득량이 달라집니다.
        </p>
      </section>

      <!-- 난이도 선택 카드 -->
      <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12" id="difficulty-container">
        <!-- 난이도 카드들이 JavaScript로 생성됩니다 -->
      </section>

      <!-- 설명 섹션 -->
      <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-green-50 border-l-4 border-green-500 rounded-lg p-6">
          <h3 class="font-bold text-green-700 mb-2">✅ 쉬움</h3>
          <ul class="text-sm text-gray-700 space-y-1">
            <li>• 짧은 콘텐츠</li>
            <li>• 시간 제한 없음</li>
            <li>• 기본 점수</li>
            <li>• 초보자 추천</li>
          </ul>
        </div>
        <div class="bg-yellow-50 border-l-4 border-yellow-500 rounded-lg p-6">
          <h3 class="font-bold text-yellow-700 mb-2">⭐ 보통</h3>
          <ul class="text-sm text-gray-700 space-y-1">
            <li>• 중간 길이</li>
            <li>• 제한된 시간</li>
            <li>• 1.5배 점수</li>
            <li>• 일반 추천</li>
          </ul>
        </div>
        <div class="bg-red-50 border-l-4 border-red-500 rounded-lg p-6">
          <h3 class="font-bold text-red-700 mb-2">🔥 어려움</h3>
          <ul class="text-sm text-gray-700 space-y-1">
            <li>• 긴 콘텐츠</li>
            <li>• 짧은 시간</li>
            <li>• 2배 점수</li>
            <li>• 고수 도전</li>
          </ul>
        </div>
      </section>
    </main>

    <!-- 푸터 -->
    <footer class="bg-gray-800 text-white mt-12">
      <div class="max-w-6xl mx-auto px-4 py-6 text-center text-gray-400 text-sm">
        <p>💙 Blue Wings Forever! ⚪</p>
      </div>
    </footer>

    <script type="module" src="../js/game-select.js"></script>
  </body>
</html>
