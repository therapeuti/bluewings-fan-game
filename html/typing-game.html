<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>타자 연습 - 블루윙스 팬 게임</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/games.css" />
  </head>
  <body class="bg-gray-50">
    <!-- 헤더 -->
    <header class="bg-gradient-to-r from-bluewings-primary to-bluewings-dark text-white shadow-lg">
      <div class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-2xl font-bold">⌨️ 타자 연습 게임</h1>
            <p class="text-blue-100 text-sm">정확하게 타이핑하세요!</p>
          </div>
          <button
            id="quit-btn"
            class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-4 py-2 rounded-lg transition-all duration-200 text-sm font-medium"
          >
            게임 포기
          </button>
        </div>
      </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="max-w-4xl mx-auto px-4 py-12">
      <!-- 게임 통계 바 -->
      <div class="bg-white rounded-lg shadow-md p-6 mb-8 grid grid-cols-4 gap-4">
        <div class="text-center">
          <p class="text-gray-600 text-sm">진행률</p>
          <p class="text-2xl font-bold text-bluewings-primary" id="progress-text">1/10</p>
        </div>
        <div class="text-center">
          <p class="text-gray-600 text-sm">타자 속도</p>
          <p class="text-2xl font-bold text-bluewings-primary" id="wpm-text">0 WPM</p>
        </div>
        <div class="text-center">
          <p class="text-gray-600 text-sm">정확도</p>
          <p class="text-2xl font-bold text-bluewings-primary" id="accuracy-text">100%</p>
        </div>
        <div class="text-center">
          <p class="text-gray-600 text-sm">소요 시간</p>
          <p class="text-2xl font-bold text-bluewings-primary" id="time-text">00:00</p>
        </div>
      </div>

      <!-- 진행 상황 바 -->
      <div class="bg-white rounded-lg shadow-md p-6 mb-8">
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div id="progress-bar" class="bg-bluewings-primary h-2 rounded-full" style="width: 10%"></div>
        </div>
      </div>

      <!-- 게임 영역 -->
      <div class="bg-white rounded-lg shadow-md p-8 mb-8">
        <!-- 타이핑할 텍스트 -->
        <div class="mb-8">
          <p class="text-gray-600 text-sm mb-2">타이핑할 문장:</p>
          <div
            id="target-text"
            class="text-2xl font-mono leading-relaxed p-6 bg-gray-50 rounded-lg border-2 border-gray-200"
          >
            <!-- 게임 시작 시 텍스트가 표시됩니다 -->
            타이핑할 텍스트가 여기 나타납니다
          </div>
        </div>

        <!-- 사용자 입력 필드 -->
        <div class="mb-4">
          <p class="text-gray-600 text-sm mb-2">입력:</p>
          <textarea
            id="input-field"
            class="w-full h-32 p-4 border-2 border-gray-200 rounded-lg font-mono text-base focus:outline-none focus:border-bluewings-primary transition-colors"
            placeholder="여기에 타이핑하세요..."
            autocomplete="off"
            spellcheck="false"
          ></textarea>
        </div>

        <!-- 비교 결과 -->
        <div id="comparison-result" class="text-lg font-mono p-4 bg-gray-50 rounded-lg min-h-16 hidden">
          <!-- 입력과 원본 비교 결과 표시 -->
        </div>
      </div>

      <!-- 버튼 그룹 -->
      <div class="flex gap-4 justify-center mb-8">
        <button
          id="skip-btn"
          class="px-6 py-3 bg-gray-400 hover:bg-gray-500 text-white rounded-lg font-bold transition-colors"
        >
          건너뛰기
        </button>
        <button
          id="submit-btn"
          class="px-6 py-3 bg-bluewings-primary hover:bg-bluewings-dark text-white rounded-lg font-bold transition-colors"
        >
          다음 문제 (Enter)
        </button>
      </div>

      <!-- 안내 메시지 -->
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-center text-sm text-gray-700">
        💡 텍스트를 정확하게 입력하고 Enter 키를 누르거나 '다음 문제' 버튼을 클릭하세요.
      </div>
    </main>

    <!-- 푸터 -->
    <footer class="bg-gray-800 text-white mt-12">
      <div class="max-w-6xl mx-auto px-4 py-6 text-center text-gray-400 text-sm">
        <p>💙 Blue Wings Forever! ⚪</p>
      </div>
    </footer>

    <script type="module" src="../js/games/typing.js"></script>
  </body>
</html>
