<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>응원가 블랭크 맞히기 - 블루윙스 팬 게임</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/games.css" />
  </head>
  <body class="bg-gray-50">
    <!-- 헤더 -->
    <header class="bg-gradient-to-r from-bluewings-primary to-bluewings-dark text-white shadow-lg">
      <div class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-2xl font-bold">✏️ 응원가 블랭크 맞히기</h1>
            <p class="text-blue-100 text-sm">빈 자리를 채우세요!</p>
          </div>
          <button
            id="quit-btn"
            class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-4 py-2 rounded-lg transition-all duration-200 text-sm font-medium"
          >
            게임 포기
          </button>
        </div>
      </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="max-w-4xl mx-auto px-4 py-12">
      <!-- 게임 통계 바 -->
      <div class="bg-white rounded-lg shadow-md p-6 mb-8 grid grid-cols-3 gap-4">
        <div class="text-center">
          <p class="text-gray-600 text-sm">문제</p>
          <p class="text-2xl font-bold text-bluewings-primary" id="progress-text">1/10</p>
        </div>
        <div class="text-center">
          <p class="text-gray-600 text-sm">정답률</p>
          <p class="text-2xl font-bold text-bluewings-primary" id="correct-rate">0%</p>
        </div>
        <div class="text-center">
          <p class="text-gray-600 text-sm">소요 시간</p>
          <p class="text-2xl font-bold text-bluewings-primary" id="time-text">00:00</p>
        </div>
      </div>

      <!-- 진행 상황 바 -->
      <div class="bg-white rounded-lg shadow-md p-6 mb-8">
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div id="progress-bar" class="bg-bluewings-primary h-2 rounded-full" style="width: 10%"></div>
        </div>
      </div>

      <!-- 게임 영역 -->
      <div class="bg-white rounded-lg shadow-md p-8 mb-8">
        <!-- 문제 -->
        <div class="mb-8">
          <p class="text-gray-600 text-sm mb-4">이 응원가의 빈 자리를 채우세요:</p>
          <div id="question-text" class="text-2xl leading-relaxed p-6 bg-gray-50 rounded-lg border-2 border-gray-200 font-bold">
            <!-- 문제가 표시됩니다 -->
          </div>
          <p class="text-gray-600 text-xs mt-3">출처: <span id="source-song" class="font-bold">응원가명</span></p>
        </div>

        <!-- 선택지 -->
        <div class="mb-6">
          <p class="text-gray-600 text-sm mb-4">정답을 선택하세요:</p>
          <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- 선택지 버튼들이 생성됩니다 -->
          </div>
        </div>

        <!-- 피드백 메시지 -->
        <div id="feedback-message" class="hidden p-4 rounded-lg text-center font-bold text-lg mb-4">
          <!-- 정답/오답 피드백 -->
        </div>
      </div>

      <!-- 버튼 그룹 -->
      <div class="flex gap-4 justify-center mb-8">
        <button
          id="quit-game-btn"
          class="px-6 py-3 bg-gray-400 hover:bg-gray-500 text-white rounded-lg font-bold transition-colors"
        >
          게임 포기
        </button>
      </div>

      <!-- 안내 메시지 -->
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-center text-sm text-gray-700">
        💡 응원가 가사의 빈 자리에 들어갈 단어를 선택하세요.
      </div>
    </main>

    <!-- 푸터 -->
    <footer class="bg-gray-800 text-white mt-12">
      <div class="max-w-6xl mx-auto px-4 py-6 text-center text-gray-400 text-sm">
        <p>💙 Blue Wings Forever! ⚪</p>
      </div>
    </footer>

    <script type="module" src="../js/games/fillInBlank.js"></script>
  </body>
</html>
